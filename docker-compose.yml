services:
  api:
    build: ./backend
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_URL: http://localhost:8080
      APP_BASE_PATH: ""
      FRONTEND_URL: http://localhost:3000
      COOKIE_PATH: /
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: matchpoint
      DB_USERNAME: matchpoint
      DB_PASSWORD: matchpoint
      MOLLIE_API_KEY: ${MOLLIE_API_KEY:-test_placeholder}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: matchpoint
      MYSQL_USER: matchpoint
      MYSQL_PASSWORD: matchpoint
      MYSQL_ROOT_PASSWORD: local-root-only
    volumes:
      - matchpoint_mysql:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-umatchpoint", "-pmatchpoint"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  matchpoint_mysql:
